name: Development readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/dev-readiness.yml"
      - ".github/workflows/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "README.md"
      - "AGENTS.md"
      - "SPEC.md"
      - "TEST_PLAN.md"
      - "docs/**"
      - "scripts/dev_readiness_report.py"
      - "tests/test_dev_readiness_report.py"

permissions:
  contents: read

jobs:
  readiness:
    name: Static readiness report
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate readiness report
        run: |
          python scripts/dev_readiness_report.py --output readiness-report.md
          cat readiness-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload readiness report
        uses: actions/upload-artifact@v4
        with:
          name: development-readiness-report
          path: readiness-report.md
          if-no-files-found: error
