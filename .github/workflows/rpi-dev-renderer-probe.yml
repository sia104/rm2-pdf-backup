name: RPI dev renderer probe

on:
  workflow_dispatch:

jobs:
  renderer-probe:
    name: Diagnose rmc renderer against copied spare RM2 data
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      DEV_BACKUP_ROOT: /home/k11-user/rm2-backup-dev
      TEST_RM2_SW_VERSION: 3.19.0.82
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install local package and rmc
        run: |
          python3 -m venv .venv-renderer
          . .venv-renderer/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"
          python -m pip install --quiet rmc
          echo "test_rm2_sw_version=$TEST_RM2_SW_VERSION"
          echo "which_rmc=$(command -v rmc || true)"
          python -m pip show rmc || true
          rmc --help | sed -n '1,80p' || true

      - name: Diagnose copied RM page and renderer commands
        run: |
          set -Eeuo pipefail
          . .venv-renderer/bin/activate
          raw_xochitl="$DEV_BACKUP_ROOT/raw/current/xochitl"
          reports="$DEV_BACKUP_ROOT/reports/renderer-probe"
          summary="$reports/renderer-probe-summary.txt"
          mkdir -p "$reports"
          : > "$summary"
          log() { echo "$*" | tee -a "$summary"; }
          if [ ! -d "$raw_xochitl" ]; then
            log "raw_xochitl_missing=$raw_xochitl"
            exit 1
          fi
          rm_count=$(find "$raw_xochitl" -type f -name '*.rm' | wc -l)
          log "test_rm2_sw_version=$TEST_RM2_SW_VERSION"
          log "rm_page_files=$rm_count"
          sample_rm="$(find "$raw_xochitl" -type f -name '*.rm' | sort | head -1)"
          if [ -z "$sample_rm" ]; then
            log "no_rm_page_files=true"
            exit 1
          fi
          log "sample_rm_size_bytes=$(stat -c '%s' "$sample_rm")"
          log "sample_rm_first_16_bytes=$(od -An -tx1 -N16 "$sample_rm" | tr -d ' \n')"
          sample_pdf_a="$reports/rmc-a.pdf"
          sample_pdf_b="$reports/rmc-b.pdf"
          sample_svg_a="$reports/rmc-a.svg"
          set +e
          rmc "$sample_rm" -o "$sample_pdf_a" > "$reports/rmc-a.stdout" 2> "$reports/rmc-a.stderr"
          code_a=$?
          rmc -o "$sample_pdf_b" "$sample_rm" > "$reports/rmc-b.stdout" 2> "$reports/rmc-b.stderr"
          code_b=$?
          rmc -t svg -o "$sample_svg_a" "$sample_rm" > "$reports/rmc-svg.stdout" 2> "$reports/rmc-svg.stderr"
          code_svg=$?
          set -e
          log "rmc_cmd_a_exit=$code_a"
          log "rmc_cmd_b_exit=$code_b"
          log "rmc_svg_exit=$code_svg"
          for label in rmc-a rmc-b rmc-svg; do
            log "${label}_stderr_first_lines_begin"
            sed -n '1,20p' "$reports/${label}.stderr" | tee -a "$summary" || true
            log "${label}_stderr_first_lines_end"
          done
          for name in rmc-a.pdf rmc-b.pdf rmc-a.svg; do
            p="$reports/$name"
            if [ -f "$p" ]; then
              log "${name}_exists=true"
              log "${name}_size_bytes=$(stat -c '%s' "$p")"
              if printf '%s' "$name" | grep -q '\.pdf$'; then
                if head -c 5 "$p" | grep -q '%PDF-'; then
                  log "${name}_pdf_header=present"
                else
                  log "${name}_pdf_header=missing"
                fi
              fi
            else
              log "${name}_exists=false"
              log "${name}_size_bytes=0"
            fi
          done
          if [ "$code_a" -eq 0 ] || [ "$code_b" -eq 0 ] || [ "$code_svg" -eq 0 ]; then
            log "renderer_probe_result=some_command_completed"
          else
            log "renderer_probe_result=all_command_variants_failed"
          fi
          log "summary_path=$summary"

      - name: Upload renderer probe summary
        uses: actions/upload-artifact@v4
        with:
          name: renderer-probe-summary
          path: /home/k11-user/rm2-backup-dev/reports/renderer-probe/renderer-probe-summary.txt
          if-no-files-found: error
