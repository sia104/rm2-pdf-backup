name: RPI RM2 diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    name: Test RM2 connectivity from Raspberry Pi runner
    runs-on: [self-hosted, rpi, rm2, dev]
    timeout-minutes: 10
    env:
      RM2_SSH_TARGET: rm2
      DEV_BACKUP_ROOT: /home/k11-user/rm2-backup-dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run read-only diagnostics
        run: bash scripts/rpi_diagnostics.sh
