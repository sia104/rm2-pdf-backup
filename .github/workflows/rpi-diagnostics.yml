name: RPI RM2 diagnostics

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/rpi-diagnostics.yml"
      - "scripts/rpi_diagnostics.sh"
      - "config/dev.example.toml"
      - "src/rm2_backup/**"
      - "pyproject.toml"

jobs:
  diagnostics:
    name: Test RM2 connectivity from Raspberry Pi runner
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      RM2_HOST: rm2
      RM2_USER: root
      DEV_BACKUP_ROOT: /home/k11-user/rm2-backup-dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run read-only diagnostics
        run: bash scripts/rpi_diagnostics.sh
