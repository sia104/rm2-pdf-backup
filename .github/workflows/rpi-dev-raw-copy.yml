name: RPI dev raw copy and run-local

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/rpi-dev-raw-copy.yml"

permissions:
  contents: read

jobs:
  raw-copy:
    name: Read-only raw copy from test RM2 then run local pipeline
    runs-on: [self-hosted, rpi, rm2, dev]
    timeout-minutes: 45
    env:
      DEV_BACKUP_ROOT: /home/k11-user/rm2-backup-dev
      VALIDATION_RUN: raw-copy-awake-rm2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install package and renderer dependencies
        run: |
          python3 -m venv .venv-raw-copy
          . .venv-raw-copy/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"
          python -m pip install --quiet rmc cairosvg pypdf

      - name: Read-only raw copy and run local pipeline
        run: |
          set -Eeuo pipefail
          . .venv-raw-copy/bin/activate
          python - <<'PY'
          from pathlib import Path
          import os
          import sqlite3
          import subprocess

          from rm2_backup.config import load_app_config
          from rm2_backup.raw_sync import plan_raw_sync

          root = Path(os.environ['DEV_BACKUP_ROOT'])
          raw_current = root / 'raw' / 'current'
          work = root / 'reports' / 'raw-copy'
          staging = work / 'staging'
          pdf_current = work / 'pdf-current'
          database = work / 'raw-copy.sqlite'
          config_path = work / 'app-config.toml'
          summary_path = work / 'raw-copy-summary.txt'
          work.mkdir(parents=True, exist_ok=True)
          staging.mkdir(parents=True, exist_ok=True)
          pdf_current.mkdir(parents=True, exist_ok=True)
          if database.exists():
              database.unlink()

          config_path.write_text(
              '\n'.join(
                  [
                      '[rm2]',
                      'host = "rm2"',
                      'user = "root"',
                      '',
                      '[paths]',
                      f'backup_root = "{root}"',
                      f'raw_current = "{raw_current}"',
                      f'pdf_current = "{pdf_current}"',
                      f'staging = "{staging}"',
                      f'database = "{database}"',
                      f'reports = "{work}"',
                      f'logs = "{work / "logs"}"',
                      '',
                      '[renderer]',
                      'mode = "rmc-svg"',
                      '',
                  ]
              ),
              encoding='utf-8',
          )

          lines = [f'config={config_path}', f'raw_current={raw_current}']
          config = load_app_config(config_path)
          sync_ok = True
          for command in plan_raw_sync(config):
              command.destination.mkdir(parents=True, exist_ok=True)
              completed_sync = subprocess.run(
                  command.argv,
                  check=False,
                  text=True,
                  capture_output=True,
              )
              lines.append(f'sync_{command.label}_returncode={completed_sync.returncode}')
              lines.append(f'sync_{command.label}_destination={command.destination}')
              if completed_sync.stdout.strip():
                  lines.append(f'sync_{command.label}_stdout={completed_sync.stdout.strip()}')
              if completed_sync.stderr.strip():
                  lines.append(f'sync_{command.label}_stderr={completed_sync.stderr.strip()}')
              if completed_sync.returncode != 0:
                  sync_ok = False

          if not sync_ok:
              lines.append('raw_sync=failed')
              summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
              print(summary_path.read_text(encoding='utf-8'))
              raise SystemExit(1)
          lines.append('raw_sync=ok')

          completed = subprocess.run(
              ['rm2-backup', 'run-local', '--config', str(config_path)],
              check=False,
              text=True,
              capture_output=True,
          )
          lines.append(f'run_local_returncode={completed.returncode}')
          lines.append(f'run_local_stdout={completed.stdout.strip()}')
          if completed.stderr.strip():
              lines.append(f'run_local_stderr={completed.stderr.strip()}')

          xochitl_count = len(list((raw_current / 'xochitl').rglob('*'))) if (raw_current / 'xochitl').exists() else 0
          template_count = len(list((raw_current / 'templates').rglob('*'))) if (raw_current / 'templates').exists() else 0
          lines.append(f'xochitl_entry_count={xochitl_count}')
          lines.append(f'template_entry_count={template_count}')

          published_pdfs = sorted(pdf_current.rglob('*.pdf'))
          lines.append(f'published_pdf_count={len(published_pdfs)}')
          for pdf in published_pdfs[:20]:
              lines.append(f'published_pdf={pdf} size={pdf.stat().st_size}')

          if database.exists():
              with sqlite3.connect(database) as con:
                  rows = con.execute(
                      'select render_status, count(*) from documents group by render_status order by render_status'
                  ).fetchall()
                  for status, count in rows:
                      lines.append(f'manifest_status_{status}={count}')
          else:
              lines.append('manifest_database=missing')

          summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(summary_path.read_text(encoding='utf-8'))
          raise SystemExit(0 if completed.returncode == 0 else 1)
          PY

      - name: Upload raw-copy summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-copy-summary
          path: /home/k11-user/rm2-backup-dev/reports/raw-copy/raw-copy-summary.txt
          if-no-files-found: error
