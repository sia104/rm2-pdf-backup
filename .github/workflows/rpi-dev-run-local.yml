name: RPI dev run-local

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/rpi-dev-run-local.yml"
      - "src/rm2_backup/**"
      - "tests/**"
      - "docs/run-local-rpi-test.md"

jobs:
  run-local:
    name: Run local pipeline against copied RM2 data
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      DEV_BACKUP_ROOT: /home/k11-user/rm2-backup-dev
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install package and renderer dependencies
        run: |
          python3 -m venv .venv-run-local
          . .venv-run-local/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"
          python -m pip install --quiet rmc cairosvg pypdf

      - name: Run local pipeline with rmc-svg renderer
        run: |
          set -Eeuo pipefail
          . .venv-run-local/bin/activate
          python - <<'PY'
          from pathlib import Path
          import os
          import sqlite3
          import subprocess

          root = Path(os.environ['DEV_BACKUP_ROOT'])
          raw_current = root / 'raw' / 'current'
          source = raw_current / 'xochitl'
          work = root / 'reports' / 'run-local'
          staging = work / 'staging'
          pdf_current = work / 'pdf-current'
          database = work / 'run-local.sqlite'
          config_path = work / 'app-config.toml'
          summary_path = work / 'run-local-summary.txt'
          work.mkdir(parents=True, exist_ok=True)
          staging.mkdir(parents=True, exist_ok=True)
          pdf_current.mkdir(parents=True, exist_ok=True)
          if database.exists():
              database.unlink()

          config_path.write_text(
              '\n'.join(
                  [
                      '[rm2]',
                      'host = "rm2"',
                      'user = "root"',
                      '',
                      '[paths]',
                      f'backup_root = "{root}"',
                      f'raw_current = "{raw_current}"',
                      f'pdf_current = "{pdf_current}"',
                      f'staging = "{staging}"',
                      f'database = "{database}"',
                      f'reports = "{work}"',
                      f'logs = "{work / "logs"}"',
                      '',
                      '[renderer]',
                      'mode = "rmc-svg"',
                      '',
                  ]
              ),
              encoding='utf-8',
          )

          lines = [f'source={source}', f'config={config_path}']
          if not source.exists():
              lines.append('error=missing copied xochitl source')
              summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
              print(summary_path.read_text(encoding='utf-8'))
              raise SystemExit(1)

          completed = subprocess.run(
              ['rm2-backup', 'run-local', '--config', str(config_path)],
              check=False,
              text=True,
              capture_output=True,
          )
          lines.append(f'run_local_returncode={completed.returncode}')
          lines.append(f'run_local_stdout={completed.stdout.strip()}')
          if completed.stderr.strip():
              lines.append(f'run_local_stderr={completed.stderr.strip()}')

          staged_pdfs = sorted(staging.rglob('*.pdf'))
          lines.append(f'staged_pdf_count={len(staged_pdfs)}')
          for pdf in staged_pdfs[:20]:
              lines.append(f'staged_pdf={pdf} size={pdf.stat().st_size}')

          if database.exists():
              with sqlite3.connect(database) as con:
                  try:
                      rows = con.execute(
                          'select render_status, count(*) from documents group by render_status order by render_status'
                      ).fetchall()
                      for status, count in rows:
                          lines.append(f'manifest_status_{status}={count}')
                      failures = con.execute(
                          'select uuid, error from documents where render_status = "failed" order by uuid limit 20'
                      ).fetchall()
                      for uuid, error in failures:
                          lines.append(f'manifest_failure={uuid} error={error}')
                  except sqlite3.Error as exc:
                      lines.append(f'manifest_query_error={exc}')
          else:
              lines.append('manifest_database=missing')

          summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(summary_path.read_text(encoding='utf-8'))
          raise SystemExit(0 if completed.returncode == 0 else 1)
          PY

      - name: Upload run-local summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-local-summary
          path: /home/k11-user/rm2-backup-dev/reports/run-local/run-local-summary.txt
          if-no-files-found: error
